# ==========================================================
# IP-Sentinel Docker Compose 部署配置
# Master 控制中枢 (Agent 不需要 Docker 部署，请使用 install.sh)
# ==========================================================
# 使用方法:
#   1. 复制此文件并根据实际情况修改环境变量
#   2. 执行 docker compose up -d 启动全部服务
#   3. 查看日志: docker compose logs -f
# ==========================================================

services:
  # ----------------------------------------------------------
  # [控制中枢] Master - Telegram Bot 长轮询服务
  # 负责全局指令下发、节点管理、OTA 调度
  # ----------------------------------------------------------
  master:
    build:
      context: .
      dockerfile: master/Dockerfile
    image: ghcr.io/xinglingqaq/ip-sentinel-master:latest
    container_name: ip-sentinel-master
    restart: unless-stopped
    environment:
      # [必填] Telegram Bot Token (通过 @BotFather 创建获取)
      - TG_TOKEN=${TG_TOKEN}
      # [必填] 管理员 Chat ID (通过 @userinfobot 获取)
      - CHAT_ID=${CHAT_ID}
      # [可选] 是否启用中枢 OTA 自更新 (默认关闭)
      - ENABLE_MASTER_OTA=${ENABLE_MASTER_OTA:-false}
      # [可选] 是否为官方公共网关模式 (默认关闭)
      - IS_OFFICIAL_GATEWAY=${IS_OFFICIAL_GATEWAY:-false}
    volumes:
      # SQLite 数据库持久化，防止容器重建时丢失节点数据
      - sentinel-data:/opt/ip_sentinel_master/data

# ----------------------------------------------------------
# [数据卷] 命名卷声明，由 Docker 引擎管理生命周期
# ----------------------------------------------------------
volumes:
  sentinel-data:
